name: CI

on:
  push:
    branches:
      - master
      - main
      - develop
      - '1.20.1'
    tags:
      - '*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:17
    env:
      GRADLE_USER_HOME: cache/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Nastavení spustitelných práv pro gradlew
        run: |
          chmod a+x ./gradlew
          chmod 770 gradlew

      - name: Cache Gradle složek
        uses: actions/cache@v4
        with:
          path: |
            .gradle
            cache/
          key: gradleCache-${{ runner.os }}-${{ hashFiles('/.gradle', '/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build projektu
        run: |
          ./gradlew clean -PinfoGitCommit=${GITHUB_SHA} -PinfoGitBranch=${GITHUB_REF} -PinfoBuildSource="GitHub Actions ($GITHUB_RUN_ID)"
          ./gradlew build -PinfoGitCommit=${GITHUB_SHA} -PinfoGitBranch=${GITHUB_REF} -PinfoBuildSource="GitHub Actions ($GITHUB_RUN_ID)"

      - name: Upload build artefaktů
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            fabric/build/libs/*.jar
            forge/build/libs/*.jar
            !**/build/libs/*-sources.jar
            !**/build/libs/*-javadoc.jar

  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    container:
      image: gradle:8.12-jdk21
    needs: build
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/1.20.1'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.
      - name: Nastavení spustitelných práv pro gradlew
        run: |
          chmod a+x ./gradlew
          chmod 770 gradlew
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: ./gradlew build sonar --info

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Stažení build artefaktů
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Extract changelog
        id: changelog
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          CONTENT=$(awk "/^## \[?${TAG_NAME}\]?/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$CONTENT" ]; then
            CONTENT="Release ${TAG_NAME}"
          fi
          {
            echo 'content<<EOF'
            echo "$CONTENT"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Publish Fabric to CurseForge
        uses: Kir-Antipov/mc-publish@v3
        with:
          curseforge-id: 1183148
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: fabric/build/libs/!(*-@(sources|javadoc)).jar
          name: SpawnGuard ${{ github.ref_name }} [Fabric]
          version: ${{ github.ref_name }}
          version-type: release
          game-versions: 1.20.1
          loaders: fabric
          java: 17
          changelog: ${{ steps.changelog.outputs.content }}

      - name: Publish Forge to CurseForge
        uses: Kir-Antipov/mc-publish@v3
        with:
          curseforge-id: 1183148
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          files: forge/build/libs/!(*-@(sources|javadoc)).jar
          name: SpawnGuard ${{ github.ref_name }} [Forge]
          version: ${{ github.ref_name }}
          version-type: release
          game-versions: 1.20.1
          loaders: forge
          java: 17
          changelog: ${{ steps.changelog.outputs.content }}

      - name: Publish Fabric to Modrinth
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-id: spawnguard
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: fabric/build/libs/!(*-@(sources|javadoc)).jar
          name: SpawnGuard ${{ github.ref_name }} [Fabric]
          version: ${{ github.ref_name }}
          version-type: release
          game-versions: 1.20.1
          loaders: fabric
          java: 17
          changelog: ${{ steps.changelog.outputs.content }}

      - name: Publish Forge to Modrinth
        uses: Kir-Antipov/mc-publish@v3
        with:
          modrinth-id: spawnguard
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: forge/build/libs/!(*-@(sources|javadoc)).jar
          name: SpawnGuard ${{ github.ref_name }} [Forge]
          version: ${{ github.ref_name }}
          version-type: release
          game-versions: 1.20.1
          loaders: forge
          java: 17
          changelog: ${{ steps.changelog.outputs.content }}

      - name: Vytvoření GitHub releasu
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: |
            fabric/build/libs/*.jar
            forge/build/libs/*.jar
