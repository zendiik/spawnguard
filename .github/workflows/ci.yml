name: CI

on:
  push:
    branches:
      - master
      - main
      - develop
    tags:
      - '*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: eclipse-temurin:21
    env:
      GRADLE_USER_HOME: cache/
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set executable permissions for gradlew
        run: |
          chmod a+x ./gradlew
          chmod 770 gradlew

      - name: Cache Gradle directories
        uses: actions/cache@v4
        with:
          path: |
            .gradle
            cache/
          key: gradleCache-${{ runner.os }}-${{ hashFiles('/.gradle', '/gradle/wrapper/gradle-wrapper.properties') }}

      - name: Build project
        env:
          GIT_COMMIT: ${{ github.sha }}
          GIT_BRANCH: ${{ github.ref }}
          BUILD_SOURCE: "GitHub Actions (${{ github.run_id }})"
        run: |
          ./gradlew clean -PinfoGitCommit="$GIT_COMMIT" -PinfoGitBranch="$GIT_BRANCH" -PinfoBuildSource="$BUILD_SOURCE"
          ./gradlew build -PinfoGitCommit="$GIT_COMMIT" -PinfoGitBranch="$GIT_BRANCH" -PinfoBuildSource="$BUILD_SOURCE"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            fabric/build/libs/*.jar
            neoforge/build/libs/*.jar
            !**/build/libs/*-sources.jar
            !**/build/libs/*-javadoc.jar

  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    container:
      image: gradle:9.2-jdk21
    needs: build
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'zulu'
      - name: Set executable permissions for gradlew
        run: |
          chmod a+x ./gradlew
          chmod 770 gradlew
      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: ./gradlew build sonar --info

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Publish Fabric
        uses: Kir-Antipov/mc-publish@v3
        with:
          curseforge-id: ${{ vars.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: fabric/build/libs/!(*-@(dev|sources|javadoc)).jar
          name: SpawnGuard ${{ github.ref_name }} [Fabric]
          version: ${{ github.ref_name }}
          version-type: release

          loaders: fabric
          game-versions: 1.21.11
          java: 21

          dependencies: |
            fabric-api(required){modrinth:P7dR8mSH}{curseforge:306612}
            cloth-config(required){modrinth:9s6osm5g}{curseforge:348521}

          changelog-file: CHANGELOG.md

      - name: Publish NeoForge
        uses: Kir-Antipov/mc-publish@v3
        with:
          curseforge-id: ${{ vars.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: neoforge/build/libs/!(*-@(dev|sources|javadoc)).jar
          name: SpawnGuard ${{ github.ref_name }} [NeoForge]
          version: ${{ github.ref_name }}
          version-type: release

          loaders: neoforge
          game-versions: 1.21.11
          java: 21

          changelog-file: CHANGELOG.md

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md
          files: |
            fabric/build/libs/*.jar
            neoforge/build/libs/*.jar
